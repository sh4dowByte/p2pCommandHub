<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - P2P Command Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: 
                radial-gradient(at 0% 0%, var(--primary-glow) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(125, 163, 114, 0.03) 0px, transparent 50%),
                var(--bg-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 56px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border-radius: 20px;
            margin-bottom: 24px;
            color: var(--bg-primary);
            box-shadow: 0 12px 24px var(--primary-glow);
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }
        .login-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }
        .form-group {
            margin-bottom: 28px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .form-input-container {
            position: relative;
        }
        .form-input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 16px 16px 48px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: var(--bg-secondary);
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 16px var(--primary-glow);
        }
        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px var(--primary-glow);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-msg {
            background: var(--error-glow);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            margin-bottom: 28px;
            display: none;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i data-lucide="terminal" style="width: 32px; height: 32px;"></i>
            </div>
            <h1 class="login-title">P2P Command Hub</h1>
            <p class="login-subtitle">Enter your password to access the dashboard</p>
        </div>

        <div id="error-alert" class="error-msg">
            <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
            <span id="error-text">Invalid password</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="password">Dashboard Password</label>
                <div class="form-input-container">
                    <i data-lucide="lock" class="form-input-icon" style="width: 18px; height: 18px;"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autofocus>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btn-submit">
                <span>Login</span>
                <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </form>
    </div>

    <script>
        // Theme Detection
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            document.body.classList.add('light-mode');
        }
        
        lucide.createIcons();
        
        const form = document.getElementById('login-form');
        const passwordInput = document.getElementById('password');
        const errorAlert = document.getElementById('error-alert');
        const errorText = document.getElementById('error-text');
        const btnSubmit = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span>Logging in...</span>';
            errorAlert.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorText.textContent = data.message || 'Login failed';
                    errorAlert.style.display = 'flex';
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = '<span>Login</span><i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (err) {
                errorText.textContent = 'Connection error';
                errorAlert.style.display = 'flex';
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<span>Login</span><i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>';
            }
        });
    </script>
</body>
</html>
